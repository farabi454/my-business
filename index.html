<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার অনলাইন শপ</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; text-align: center; }
        header { background: #333; color: #fff; padding: 1rem; }
        .product-container { display: flex; justify-content: center; flex-wrap: wrap; padding: 20px; }
        .product-card { background: #fff; border: 1px solid #ddd; margin: 10px; padding: 15px; width: 250px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { max-width: 100%; border-radius: 5px; }
        .price { color: #e91e63; font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
        .buy-btn { display: inline-block; background: #25d366; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>স্বাগতম আমাদের অনলাইন শপে</h1>
</header>

<div class="product-container">
    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="প্রোডাক্ট">
        <h3>আপনার প্রোডাক্টের নাম</h3>
        <p class="price">৳ ৫০০</p>
        <a href="https://wa.me/8801XXXXXXXXX" target="_blank" class="buy-btn">হোয়াটসঅ্যাপে অর্ডার দিন</a>
    </div>
</div>

</body>
</html>
